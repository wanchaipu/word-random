<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Random</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .word-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            perspective: 600px;
        }

        .word-display {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.3rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.6);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .word-display.animate {
            animation: flipIn 0.4s ease;
        }

        @keyframes flipIn {
            0%   { transform: rotateX(90deg); opacity: 0; }
            100% { transform: rotateX(0deg);  opacity: 1; }
        }

        .letter-count-badge {
            font-size: 1rem;
            color: #a0cfff;
        }

        .btn-random {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 16px 48px;
            color: #000;
            letter-spacing: 0.1rem;
            box-shadow: 0 8px 32px rgba(79, 172, 254, 0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-random:active {
            transform: scale(0.95);
            box-shadow: 0 4px 16px rgba(79, 172, 254, 0.3);
        }

        .filter-btn {
            border-radius: 50px;
            font-size: 0.9rem;
            padding: 6px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #aaa;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: rgba(79, 172, 254, 0.2);
            border-color: #4facfe;
            color: #4facfe;
        }

        .meaning-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
            font-size: 1rem;
            min-height: 48px;
        }

        .title-text {
            color: #fff;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.05rem;
        }

        .subtitle-text {
            color: #7aa5cc;
            font-size: 0.85rem;
        }

        .counter-text {
            color: #4facfe;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="container" style="max-width: 420px;">

    <!-- Header -->
    <div class="text-center mb-4">

            <button class="filter-btn" data-len="4">4</button>

let selectedLen = 0;
let history = [];
let usedIndices = [];
let filteredWords = [];

function getFiltered() {
    if (selectedLen === 0) return words;
    return words.filter(w => w.word.length === selectedLen);
}

function randomWord() {
    filteredWords = getFiltered();
    if (filteredWords.length === 0) return;

    if (usedIndices.length >= filteredWords.length) {
        usedIndices = [];
    }

    let idx;
    do { idx = Math.floor(Math.random() * filteredWords.length); }
    while (usedIndices.includes(idx));

    usedIndices.push(idx);
    const item = filteredWords[idx];

    const display = document.getElementById('wordDisplay');
    display.classList.remove('animate');
    void display.offsetWidth;
    display.classList.add('animate');
    display.textContent = item.word;

    document.getElementById('letterCount').textContent = `${item.word.length} ตัวอักษร`;
    document.getElementById('meaningBox').textContent = item.meaning || '—';

    const used = usedIndices.length;
    const total = filteredWords.length;
    const pct = Math.round((used / total) * 100);
    document.getElementById('counterText').textContent = '';
    document.getElementById('progressBar').style.width = pct + '%';

    history.unshift(item.word);
    if (history.length > 10) history.pop();
    renderHistory();
}

function renderHistory() {
    const el = document.getElementById('historyList');
    el.innerHTML = history.map((w, i) => `
        <span style="background:rgba(255,255,255,${0.12 - i*0.01});border-radius:8px;padding:4px 12px;color:#ccc;font-size:0.85rem;">
            ${w}
        </span>
    `).join('');
}

document.getElementById('btnRandom').addEventListener('click', randomWord);

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedLen = parseInt(btn.dataset.len);
        usedIndices = [];
        history = [];
        renderHistory();
        randomWord();
    });
});
